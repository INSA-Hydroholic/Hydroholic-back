services:
  db:
    image: postgres:17.9-alpine3.23
    env_file: ".env"
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -h localhost -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: .
    env_file: ".env"
    depends_on:
      - db
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    ports:
      - "${SERVER_PORT}:3000"
    
volumes:
  db_data:

networks:
  default:
    name: hydroholic_network